spring:

  application:
    name: maintenance-service


  datasource:
    url: jdbc:postgresql://localhost:5433/maintenance_db
    username: postgres
    password: postgres


  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml


server:
  port: 8082

equipment-service:
  url: http://localhost:8081


jpa:
  show-sql: true
  properties:
    hibernate:
      format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE